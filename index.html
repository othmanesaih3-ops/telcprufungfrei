<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zertify Pro Clone - Telc B2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .option-active { border-color: #2563eb !important; background-color: #eff6ff !important; ring: 2px; }
        .is-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .is-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 overflow-hidden">

    <div id="app" class="h-screen flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 shadow-sm z-50">
            <div class="flex items-center gap-3 cursor-pointer" onclick="renderHome()">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg">Z</div>
                <span class="font-bold text-xl tracking-tighter">ZERTIFY<span class="text-indigo-600 font-black italic underline">PRO</span></span>
            </div>
            
            <div id="status-bar" class="hidden flex items-center gap-4">
                <div class="bg-amber-50 text-amber-700 px-4 py-1.5 rounded-full border border-amber-200 font-mono font-bold" id="timer">15:00</div>
                <button onclick="renderHome()" class="p-2 bg-slate-100 rounded-full hover:bg-red-50 hover:text-red-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
        </header>

        <!-- Main View Area -->
        <div id="main-view" class="flex-1 overflow-hidden">
            <!-- Content will change here -->
        </div>
    </div>

    <script>
        // --- DATABASE ---
        // هنا كتحط المعلومات ديالك (الأوديوات، النصوص، والأسئلة)
        const examDatabase = {
            "Lesen Teil 1": {
                type: "lesen",
                title: "Limonade 1 - Leseverstehen",
                text: `<div class="prose lg:prose-xl"><h3>Möchten Sie Kraft, Jugend und Gesundheit?</h3><p>Dann suchen Sie nach Sauerstoff-Mineralwasser. Hersteller versprechen magische Kräfte. Doch Forscher halten es für Unsinn. Der Körper nimmt Sauerstoff über die Atmung auf...</p></div>`,
                questions: [
                    { q: "Welche Überschrift passt zu Text 1?", options: ["a) Limonade aus dem Hahn", "f) Frische Luft macht stark", "e) Viel Wasser trinken"], correct: 1 }
                ]
            },
            "Hören Teil 1": {
                type: "hoeren",
                title: "Hören 1 - Nachrichtensendung",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // دير رابط الأوديو هنا
                text: `<div class="flex flex-col items-center justify-center h-64 bg-slate-100 rounded-3xl border-2 border-dashed border-slate-300">
                        <p class="text-slate-500 font-medium">Hören Sie die Audiospur und lösen Sie die Aufgaben</p>
                       </div>`,
                questions: [
                    { q: "41. Die Deutsche Lufthansa hat ihre Führungsposition verloren.", options: ["Richtig", "Falsch"], correct: 1 },
                    { q: "42. Ein Bonner Sportverein zeigt sein Angebot.", options: ["Richtig", "Falsch"], correct: 0 }
                ]
            }
        };

        let userAnswers = {};
        let locked = false;

        // --- NAVIGATION ---
        function renderHome() {
            locked = false;
            document.getElementById('status-bar').classList.add('hidden');
            document.getElementById('main-view').innerHTML = `
                <div class="max-w-5xl mx-auto p-10 h-full overflow-y-auto custom-scroll">
                    <h1 class="text-5xl font-black text-center mb-4">Vorbereitung Telc B2</h1>
                    <p class="text-center text-slate-500 text-lg mb-12">اختر الاختبار لبدء التدريب</p>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <div onclick="startExam('Lesen Teil 1')" class="bg-white p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition-all cursor-pointer border border-slate-100 group">
                            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl font-black mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">L</div>
                            <h2 class="text-2xl font-black">Lesen Teil 1</h2>
                            <p class="text-slate-400 mt-2">Limonade, Schlafzug...</p>
                        </div>
                        
                        <div onclick="startExam('Hören Teil 1')" class="bg-white p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition-all cursor-pointer border border-slate-100 group">
                            <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center text-2xl font-black mb-6 group-hover:bg-purple-600 group-hover:text-white transition-colors">H</div>
                            <h2 class="text-2xl font-black">Hören Teil 1</h2>
                            <p class="text-slate-400 mt-2">Lufthansa, Erdbeben...</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function startExam(part) {
            const data = examDatabase[part];
            userAnswers = {};
            document.getElementById('status-bar').classList.remove('hidden');
            
            let audioHtml = data.type === 'hoeren' ? `
                <div class="mb-6 p-4 bg-indigo-600 rounded-2xl shadow-lg">
                    <p class="text-white text-sm font-bold mb-2 uppercase tracking-widest">Audio Player</p>
                    <audio controls class="w-full h-10">
                        <source src="${data.audioUrl}" type="audio/mpeg">
                    </audio>
                </div>
            ` : '';

            document.getElementById('main-view').innerHTML = `
                <div class="flex flex-col md:flex-row h-full">
                    <!-- Left Column -->
                    <div class="w-full md:w-1/2 p-8 bg-white border-r overflow-y-auto custom-scroll">
                        ${audioHtml}
                        <h1 class="text-3xl font-black mb-6">${data.title}</h1>
                        <div class="text-slate-700 text-lg leading-relaxed">${data.text}</div>
                    </div>
                    <!-- Right Column -->
                    <div class="w-full md:w-1/2 p-8 bg-slate-50 overflow-y-auto custom-scroll">
                        <div id="quiz-area" class="max-w-xl mx-auto space-y-6 pb-24">
                            ${data.questions.map((q, qIdx) => `
                                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm" id="card-${qIdx}">
                                    <p class="font-bold text-lg mb-4">${qIdx + 41}. ${q.q}</p>
                                    <div class="grid gap-2">
                                        ${q.options.map((opt, oIdx) => `
                                            <button onclick="pick(${qIdx}, ${oIdx}, this)" class="opt-btn text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 transition-all font-medium bg-slate-50">
                                                ${opt}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                            <button onclick="finish('${part}')" id="finish-btn" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-xl shadow-lg hover:bg-indigo-700 transition-all">Abgeben (Fertig)</button>
                            <div id="result-display" class="hidden p-10 bg-slate-900 text-white rounded-[2.5rem] text-center"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function pick(qIdx, oIdx, btn) {
            if (locked) return;
            const parent = btn.parentElement;
            parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('option-active'));
            btn.classList.add('option-active');
            userAnswers[qIdx] = oIdx;
        }

        function finish(part) {
            if (locked) return;
            locked = true;
            const data = examDatabase[part];
            let score = 0;

            data.questions.forEach((q, idx) => {
                const buttons = document.querySelectorAll(`#card-${idx} .opt-btn`);
                const correctIdx = q.correct;
                const userIdx = userAnswers[idx];

                buttons[correctIdx].classList.add('is-correct');
                if (userIdx !== undefined && userIdx !== correctIdx) {
                    buttons[userIdx].classList.add('is-wrong');
                }
                if (userIdx === correctIdx) score++;
            });

            document.getElementById('finish-btn').classList.add('hidden');
            const res = document.getElementById('result-display');
            res.classList.remove('hidden');
            res.innerHTML = `
                <p class="text-slate-400 uppercase tracking-widest font-bold text-sm mb-2">Ergebnis</p>
                <h2 class="text-6xl font-black">${score} / ${data.questions.length}</h2>
                <button onclick="renderHome()" class="mt-8 text-indigo-400 font-bold underline">Zurück zum Start</button>
            `;
            res.scrollIntoView({ behavior: 'smooth' });
        }

        // Timer
        let s = 900;
        setInterval(() => {
            if (s > 0) {
                s--;
                let m = Math.floor(s/60);
                let sec = s%60;
                const tEl = document.getElementById('timer');
                if(tEl) tEl.innerText = `${m}:${sec < 10 ? '0' + sec : sec}`;
            }
        }, 1000);

        // Start App
        renderHome();
    </script>
</body>
</html>
